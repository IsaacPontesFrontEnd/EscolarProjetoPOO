<!-- ADIÇÃO COM SUPORTE A TEMPO -->
<script>
const params = new URLSearchParams(window.location.search);
const comTempo = params.get("tempo") === "true";

let score=0,level=1,streak=0,lives=3,currentAnswer=0;
let scoreMultiplier=1,comboBoost=0,shield=false;
let difficultyScale=1,timeLimit=5000,timerInterval,isPaused=false,timeLeft=0;

const upgrades=[
 {name:"💰 +50% pontos / -1 vida",effect:()=>{scoreMultiplier+=0.5;lives--}},
 {name:"❤️ +1 vida / -20% pontos",effect:()=>{lives++;scoreMultiplier-=0.2}},
 {name:"🔥 Combo Boost",effect:()=>comboBoost+=1},
 {name:"🛡️ Escudo",effect:()=>shield=true}
];

function generateQuestion(){
 let max=Math.floor(level*10*difficultyScale);
 let a=Math.floor(Math.random()*max);
 let b=Math.floor(Math.random()*max);

 currentAnswer = a + b;
 question.textContent = `${a} + ${b}`;
 answer.value='';
 startTimer();
}

function startTimer(){
 if(!comTempo){
   timer.style.display = "none";
   return;
 }

 if(isPaused) return;
 clearInterval(timerInterval);
 timeLeft=timeLimit;
 timer.style.width='100%';

 timerInterval=setInterval(()=>{
   if(isPaused) return;
   timeLeft-=50;
   timer.style.width=(timeLeft/timeLimit*100)+'%';

   if(timeLeft<=0){
     clearInterval(timerInterval);
     handleWrong();
   }
 },50);
}

function dynamicScore(){
 let base=10;
 let combo=streak*(2+comboBoost);
 let gained=(base+level+combo)*scoreMultiplier;

 if(Math.random()<0.1){gained*=2;feedback.textContent+=' ⚡CRÍTICO!';}
 if(comTempo && timeLeft<1000){gained+=10;}

 return Math.floor(gained);
}

function checkAnswer(){
 if(isPaused) return;
 clearInterval(timerInterval);
 let val=Number(answer.value);

 if(val===currentAnswer){
   streak++;
   let gained=dynamicScore();
   score+=gained;
   feedback.textContent=`+${gained}`;
   feedback.className='feedback correct';
 }else{
   handleWrong();
 }

 difficultyScale+=0.05;
 if(comTempo){timeLimit=Math.max(2000,timeLimit*0.98);}

 if(score>=level*60){level++;showUpgrades()}
 updateUI();
 generateQuestion();
}

function handleWrong(){
 answer.value='';

 if(shield){shield=false}
 else{
   lives--;
   if(lives<=0){alert('Game Over');location.href='index.html';return}
 }

 feedback.textContent = streak>=5 ? '💥 COMBO QUEBRADO!' : 'Erro!';
 streak=0;
 feedback.className='feedback wrong';
 updateUI();
 generateQuestion();
}
</script>
